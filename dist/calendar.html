<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalender Akademik — ABAIS | Abdurrahman Bin Auf Islamic School</title>
  <meta name="description" content="Kalender akademik SDIT dan SMP-SMA Abdurrahman Bin Auf Islamic School Bogor." />
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <style>
    /* ===== Premium Calendar Styles ===== */
    .cal-hero {
      text-align: center;
      padding: 3rem 0 2rem;
    }
    .cal-hero__badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(43,143,189,0.1);
      color: var(--clr-primary);
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .cal-hero h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--clr-heading);
      margin-bottom: 0.5rem;
    }
    .cal-hero p {
      color: var(--clr-text-muted);
      max-width: 500px;
      margin: 0 auto;
      font-size: 1.05rem;
    }

    /* Unit toggle pills */
    .cal-unit-toggle {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 2rem;
    }
    .cal-unit-btn {
      padding: 0.7rem 2rem;
      border: 2px solid var(--clr-border);
      background: var(--clr-white);
      color: var(--clr-text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .cal-unit-btn:first-child { border-radius: 50px 0 0 50px; }
    .cal-unit-btn:last-child { border-radius: 0 50px 50px 0; border-left: 0; }
    .cal-unit-btn--active {
      background: var(--clr-primary);
      border-color: var(--clr-primary);
      color: white;
    }
    .cal-unit-btn:hover:not(.cal-unit-btn--active) {
      border-color: var(--clr-primary);
      color: var(--clr-primary);
    }

    /* Month navigator */
    .cal-month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .cal-month-nav__arrow {
      width: 44px;
      height: 44px;
      border: 2px solid var(--clr-border);
      background: var(--clr-white);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: all 0.25s ease;
      color: var(--clr-text);
    }
    .cal-month-nav__arrow:hover {
      background: var(--clr-primary);
      border-color: var(--clr-primary);
      color: white;
      transform: scale(1.05);
    }
    .cal-month-nav__title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--clr-heading);
      min-width: 240px;
      text-align: center;
    }

    /* Premium Calendar Grid */
    .cal-view {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 2rem;
      align-items: start;
    }
    @media (max-width: 960px) {
      .cal-view { grid-template-columns: 1fr; }
    }

    .cal-grid-wrap {
      background: var(--clr-white);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid var(--clr-border-light);
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }
    .cal-weekday {
      text-align: center;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--clr-text-muted);
      padding: 0.5rem 0;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      position: relative;
      cursor: default;
      transition: all 0.2s ease;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--clr-text);
    }
    .cal-day--empty { background: transparent; }
    .cal-day--today {
      background: var(--clr-primary);
      color: white;
      font-weight: 700;
      box-shadow: 0 4px 12px rgba(43,143,189,0.3);
    }
    .cal-day--has-event {
      cursor: pointer;
      font-weight: 600;
    }
    .cal-day--has-event:hover {
      background: rgba(43,143,189,0.08);
      transform: scale(1.05);
    }
    .cal-day--today.cal-day--has-event:hover {
      background: var(--clr-primary);
    }

    .cal-day__dots {
      display: flex;
      gap: 3px;
      position: absolute;
      bottom: 5px;
    }
    .cal-day__dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .cal-day--today .cal-day__dot {
      box-shadow: 0 0 0 1px white;
    }

    /* Sidebar events */
    .cal-sidebar {
      position: sticky;
      top: 100px;
    }

    .cal-sidebar__card {
      background: var(--clr-white);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid var(--clr-border-light);
      margin-bottom: 1.5rem;
    }

    .cal-sidebar__title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cal-event-card {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 12px;
      margin-bottom: 0.5rem;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .cal-event-card:hover {
      background: rgba(43,143,189,0.04);
      border-color: var(--clr-border-light);
    }

    .cal-event-card__bar {
      width: 4px;
      min-height: 36px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .cal-event-card__content {
      flex: 1;
      min-width: 0;
    }

    .cal-event-card__title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .cal-event-card__date {
      font-size: 0.78rem;
      color: var(--clr-text-muted);
    }

    .cal-event-card__badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 50px;
      margin-top: 4px;
    }

    .cal-no-events {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--clr-text-muted);
    }
    .cal-no-events span { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

    /* Legend row */
    .cal-legend-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1.25rem;
      margin-top: 2rem;
      padding: 1.25rem;
      background: var(--clr-white);
      border-radius: var(--radius-lg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid var(--clr-border-light);
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--clr-text-muted);
      font-weight: 500;
    }
    .cal-legend-item__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Upcoming countdown */
    .cal-countdown {
      background: linear-gradient(135deg, #2B8FBD, #1e6b8f);
      color: white;
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .cal-countdown__label {
      font-size: 0.78rem;
      opacity: 0.85;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .cal-countdown__event {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0.5rem 0;
    }
    .cal-countdown__days {
      font-size: 2rem;
      font-weight: 800;
    }
    .cal-countdown__days small {
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0.9;
    }
  </style>
  <script type="module" crossorigin src="/assets/calendar-DGpBwkl3.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/data-manager-CG9Brrkb.js">
  <link rel="modulepreload" crossorigin href="/assets/chat-D0TGgotQ.js">
  <link rel="stylesheet" crossorigin href="/assets/data-manager-ehck1eFZ.css">
  <link rel="stylesheet" crossorigin href="/assets/chat-DW-CDbQ7.css">
</head>
<body>
  <div class="page-wrapper">
    <div id="navbarSlot"></div>
    <main>
      <section class="page-hero">
        <h1>Kalender Akademik</h1>
        <p>Jadwal kegiatan dan event penting di Abdurrahman Bin Auf Islamic School</p>
      </section>

      <section class="section" id="calendarSection">
        <div class="container">

          <!-- Unit Toggle -->
          <div class="cal-unit-toggle" id="calUnitFilter">
            <button class="cal-unit-btn cal-unit-btn--active" data-unit="sdit">🏫 SDIT</button>
            <button class="cal-unit-btn" data-unit="smp-sma">🎓 SMP — SMA</button>
          </div>

          <!-- Month Navigator -->
          <div class="cal-month-nav">
            <button class="cal-month-nav__arrow" id="prevMonth">❮</button>
            <div class="cal-month-nav__title" id="monthTitle"></div>
            <button class="cal-month-nav__arrow" id="nextMonth">❯</button>
          </div>

          <!-- Calendar + Sidebar -->
          <div class="cal-view">
            <!-- Grid -->
            <div>
              <div class="cal-grid-wrap">
                <div class="cal-weekdays" id="calWeekdays"></div>
                <div class="cal-days" id="calDays"></div>
              </div>

              <!-- Legend -->
              <div class="cal-legend-row">
                <div class="cal-legend-item"><span class="cal-legend-item__dot" style="background:#2B8FBD;"></span>Akademik</div>
                <div class="cal-legend-item"><span class="cal-legend-item__dot" style="background:#E07B6A;"></span>Ujian</div>
                <div class="cal-legend-item"><span class="cal-legend-item__dot" style="background:#27ae60;"></span>Kegiatan</div>
                <div class="cal-legend-item"><span class="cal-legend-item__dot" style="background:#f39c12;"></span>Event</div>
                <div class="cal-legend-item"><span class="cal-legend-item__dot" style="background:#95a5a6;"></span>Libur</div>
              </div>
            </div>

            <!-- Sidebar -->
            <div class="cal-sidebar">
              <!-- Countdown -->
              <div class="cal-countdown" id="calCountdown" style="display:none;"></div>

              <!-- Events this month -->
              <div class="cal-sidebar__card">
                <div class="cal-sidebar__title">📋 Event Bulan Ini</div>
                <div id="calEventsList"></div>
              </div>
            </div>
          </div>

        </div>
      </section>
    </main>
    <div id="footerSlot"></div>
    <div id="waSlot"></div>
  </div>

</body>
</html>
