<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalender Akademik — ABAIS | Abdurrahman Bin Auf Islamic School</title>
  <meta name="description" content="Kalender akademik SDIT dan SMP-SMA Abdurrahman Bin Auf Islamic School Bogor." />
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbarSlot"></div>
    <main>
      <section class="page-hero">
        <h1>Kalender Akademik</h1>
        <p>Jadwal kegiatan dan event penting di Abdurrahman Bin Auf Islamic School</p>
      </section>

      <section class="section" id="calendarSection">
        <div class="container">
          <!-- Unit Filter -->
          <div class="filter-tabs" id="calUnitFilter">
            <button class="filter-tab filter-tab--active" data-unit="sdit">SDIT</button>
            <button class="filter-tab" data-unit="smp-sma">SMP-SMA</button>
          </div>

          <!-- Month Navigation -->
          <div class="cal-nav">
            <button class="cal-nav__btn" id="prevMonth">❮</button>
            <h3 class="cal-nav__title" id="monthTitle"></h3>
            <button class="cal-nav__btn" id="nextMonth">❯</button>
          </div>

          <!-- Calendar Grid -->
          <div class="cal-grid" id="calGrid"></div>

          <!-- Events for selected month -->
          <div class="cal-events" id="calEvents">
            <h3>Event Bulan Ini</h3>
            <div id="calEventsList"></div>
          </div>

          <!-- Legend -->
          <div class="cal-legend">
            <div class="cal-legend__item"><span class="cal-legend__dot" style="background:#2B8FBD;"></span>Akademik</div>
            <div class="cal-legend__item"><span class="cal-legend__dot" style="background:#E07B6A;"></span>Ujian</div>
            <div class="cal-legend__item"><span class="cal-legend__dot" style="background:#27ae60;"></span>Kegiatan</div>
            <div class="cal-legend__item"><span class="cal-legend__dot" style="background:#f39c12;"></span>Event</div>
            <div class="cal-legend__item"><span class="cal-legend__dot" style="background:#95a5a6;"></span>Libur</div>
          </div>
        </div>
      </section>
    </main>
    <div id="footerSlot"></div>
    <div id="waSlot"></div>
  </div>
  <script type="module">
    import { getNavbar, getFooter, getWaFloat } from '/js/components.js';
    import { seedInitialData, getCalendarEvents } from '/js/data-manager.js';
    import { initChat } from '/js/chat.js';

    document.getElementById('navbarSlot').innerHTML = getNavbar('calendar');
    document.getElementById('footerSlot').innerHTML = getFooter();
    document.getElementById('waSlot').innerHTML = getWaFloat();
    seedInitialData();
    import('/js/main.js');
    initChat();

    // Calendar Logic
    const DAYS = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
    const MONTHS = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
    let currentDate = new Date();
    let currentUnit = 'sdit';

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();

      document.getElementById('monthTitle').textContent = `${MONTHS[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      const events = getCalendarEvents().filter(e => e.unit === currentUnit);

      let html = DAYS.map(d => `<div class="cal-cell cal-cell--header">${d}</div>`).join('');

      // Empty cells
      for (let i = 0; i < firstDay; i++) {
        html += '<div class="cal-cell cal-cell--empty"></div>';
      }

      // Day cells
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
        const dayEvents = events.filter(e => {
          const start = e.event_date;
          const end = e.end_date || e.event_date;
          return dateStr >= start && dateStr <= end;
        });

        const hasEvent = dayEvents.length > 0;
        const dots = dayEvents.map(e => `<span class="cal-dot" style="background:${e.color || '#2B8FBD'}"></span>`).join('');

        html += `
          <div class="cal-cell ${isToday ? 'cal-cell--today' : ''} ${hasEvent ? 'cal-cell--event' : ''}">
            <span class="cal-cell__num">${day}</span>
            ${dots ? `<div class="cal-cell__dots">${dots}</div>` : ''}
          </div>`;
      }

      document.getElementById('calGrid').innerHTML = html;

      // Events list
      const monthEvents = events.filter(e => {
        const d = new Date(e.event_date);
        return d.getFullYear() === year && d.getMonth() === month;
      });

      if (monthEvents.length === 0) {
        document.getElementById('calEventsList').innerHTML = '<p style="color:var(--clr-text-muted);text-align:center;padding:var(--space-lg);">Tidak ada event di bulan ini.</p>';
      } else {
        document.getElementById('calEventsList').innerHTML = monthEvents.map(e => `
          <div class="cal-event-item">
            <div class="cal-event-item__color" style="background:${e.color || '#2B8FBD'}"></div>
            <div>
              <strong>${e.title}</strong>
              <p style="font-size:var(--fs-caption);color:var(--clr-text-muted);">${formatDate(e.event_date)}${e.end_date ? ' — ' + formatDate(e.end_date) : ''}</p>
            </div>
          </div>
        `).join('');
      }
    }

    function formatDate(str) {
      const d = new Date(str + 'T00:00:00');
      return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // Navigation
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Unit filter
    document.getElementById('calUnitFilter').addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;
      document.querySelectorAll('#calUnitFilter .filter-tab').forEach(b => b.classList.remove('filter-tab--active'));
      btn.classList.add('filter-tab--active');
      currentUnit = btn.dataset.unit;
      renderCalendar();
    });

    renderCalendar();
  </script>
</body>
</html>
