<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri Kegiatan — ABAIS | Abdurrahman Bin Auf Islamic School</title>
  <meta name="description" content="Galeri foto kegiatan Abdurrahman Bin Auf Islamic School (ABAIS) — Tahfidz, Entrepreneur, Beladiri, dan kegiatan sekolah lainnya." />
  <link rel="icon" type="image/png" href="/assets/images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbarSlot"></div>
    <main>
      <section class="page-hero">
        <h1>Galeri Kegiatan</h1>
        <p>Momen-momen berharga kegiatan di Abdurrahman Bin Auf Islamic School</p>
      </section>

      <section class="section" id="gallerySection">
        <div class="container">
          <!-- Unit Filter -->
          <div class="filter-tabs" id="unitFilter">
            <button class="filter-tab filter-tab--active" data-unit="all">Semua</button>
            <button class="filter-tab" data-unit="sdit">SDIT</button>
            <button class="filter-tab" data-unit="smp-sma">SMP-SMA</button>
          </div>
          <!-- Category Filter -->
          <div class="filter-tabs filter-tabs--sub" id="categoryFilter">
            <button class="filter-tab filter-tab--sm filter-tab--active" data-cat="all">Semua</button>
            <button class="filter-tab filter-tab--sm" data-cat="tahfidz">📖 Tahfidz</button>
            <button class="filter-tab filter-tab--sm" data-cat="entrepreneur">💼 Entrepreneur</button>
            <button class="filter-tab filter-tab--sm" data-cat="beladiri">🥋 Beladiri</button>
            <button class="filter-tab filter-tab--sm" data-cat="umum">🏫 Umum</button>
          </div>

          <div class="gallery-grid" id="galleryGrid"></div>
        </div>
      </section>
    </main>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox__close" id="lightboxClose">✕</button>
      <div class="lightbox__content">
        <img id="lightboxImg" src="" alt="" />
        <p class="lightbox__caption" id="lightboxCaption"></p>
      </div>
    </div>

    <div id="footerSlot"></div>
    <div id="waSlot"></div>
  </div>
  <script type="module">
    import { getNavbar, getFooter, getWaFloat } from '/js/components.js';
    import { seedInitialData, getGallery } from '/js/data-manager.js';
    import { initChat } from '/js/chat.js';

    document.getElementById('navbarSlot').innerHTML = getNavbar('gallery');
    document.getElementById('footerSlot').innerHTML = getFooter();
    document.getElementById('waSlot').innerHTML = getWaFloat();
    seedInitialData();
    import('/js/main.js');
    initChat();

    // Gallery Logic
    let currentUnit = 'all';
    let currentCat = 'all';

    const categoryColors = {
      tahfidz: '#2B8FBD',
      entrepreneur: '#f39c12',
      beladiri: '#e74c3c',
      umum: '#27ae60'
    };

    const categoryEmoji = {
      tahfidz: '📖',
      entrepreneur: '💼',
      beladiri: '🥋',
      umum: '🏫'
    };

    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      let items = getGallery();

      if (currentUnit !== 'all') items = items.filter(i => i.unit === currentUnit);
      if (currentCat !== 'all') items = items.filter(i => i.category === currentCat);

      if (items.length === 0) {
        grid.innerHTML = '<div class="gallery-empty"><p>📷</p><p>Belum ada foto untuk kategori ini.</p><p>Foto akan ditambahkan oleh admin.</p></div>';
        return;
      }

      grid.innerHTML = items.map(item => `
        <div class="gallery-item" data-id="${item.id}" style="background:${item.image_url ? `url(${item.image_url}) center/cover` : `linear-gradient(135deg, ${categoryColors[item.category] || '#2B8FBD'}33, ${categoryColors[item.category] || '#2B8FBD'}11)`};">
          <div class="gallery-item__img" style="${item.image_url ? 'display:none' : ''}">
            <span style="font-size:3rem;">${categoryEmoji[item.category] || '📷'}</span>
          </div>
          <div class="gallery-item__overlay">
            <h4>${item.title}</h4>
            <p>${item.description || ''}</p>
            <span class="gallery-item__badge">${(item.unit || '').toUpperCase()} • ${item.category}</span>
          </div>
        </div>
      `).join('');
    }

    // Filter events
    document.getElementById('unitFilter').addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;
      document.querySelectorAll('#unitFilter .filter-tab').forEach(b => b.classList.remove('filter-tab--active'));
      btn.classList.add('filter-tab--active');
      currentUnit = btn.dataset.unit;
      renderGallery();
    });

    document.getElementById('categoryFilter').addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;
      document.querySelectorAll('#categoryFilter .filter-tab').forEach(b => b.classList.remove('filter-tab--active'));
      btn.classList.add('filter-tab--active');
      currentCat = btn.dataset.cat;
      renderGallery();
    });

    // Lightbox
    document.getElementById('galleryGrid').addEventListener('click', e => {
      const item = e.target.closest('.gallery-item');
      if (!item) return;
      const id = item.dataset.id;
      const data = getGallery().find(g => g.id === id);
      if (!data) return;
      const lb = document.getElementById('lightbox');
      document.getElementById('lightboxImg').src = data.image_url || '';
      document.getElementById('lightboxCaption').textContent = data.title;
      if (data.image_url) lb.classList.add('lightbox--open');
    });

    document.getElementById('lightboxClose').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('lightbox--open');
    });

    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('lightbox--open');
      }
    });

    renderGallery();
  </script>
</body>
</html>
